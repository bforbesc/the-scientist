name: The Scientist — Monthly Newsletter

on:
  # Runs on the 1st of every month at 9am UTC
  schedule:
    - cron: '0 9 1 * *'

  # Manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: python pipeline.py

      - name: Commit updated seed pool
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources.yaml latest_issue.json
          git diff --cached --quiet || git commit -m "chore: update seed pool and archive issue [skip ci]"
          git push

      - name: Archive newsletter issue
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: latest_issue.json
          retention-days: 90

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text": "⚠️ *The Scientist* pipeline failed. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}'
