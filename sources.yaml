# ── 4. Practitioner Categories ───────────────────────────────────────
categories:
  infra_and_mlops:
    label: "Infra & MLOps"
    keywords:
      - inference optimization
      - serving
      - deployment
      - distributed training
      - mlops
      - latency
      - throughput
      - quantization
      - pruning
      - distillation
      - KV cache
      - speculative decoding
      - tensor parallelism
      - vllm
      - tensorrt
      - deepspeed
      - paged attention
  modeling:
    label: "Modeling & Architecture"
    keywords:
      - architecture
      - transformer
      - attention mechanism
      - foundation model
      - pretraining
      - scaling law
      - mixture of experts
      - state space model
      - mamba
      - multimodal
      - vision language
      - long context
