# ─────────────────────────────────────────────────────────────────────
# THE SCIENTIST — Source Curation Config (v2 — 3-Layer Strategy)
# ─────────────────────────────────────────────────────────────────────
# Layer 1: arXiv + Semantic Scholar keyword search (known topics)
# Layer 2: Hugging Face Daily Papers (social signal / novelty)
# Layer 3: Semantic Scholar Recommendations (conceptual discovery)
# ─────────────────────────────────────────────────────────────────────

# ── 1. arXiv Categories ─────────────────────────────────────────────
arxiv_categories:
  - cs.CL   # Computation and Language — LLMs, NLP, RAG
  - cs.LG   # Machine Learning — training, architectures
  - cs.AI   # Artificial Intelligence — agents, reasoning
  - cs.IR   # Information Retrieval — search, embeddings
  - cs.DC   # Distributed Computing — infra (vLLM, DeepSpeed)
  - cs.SE   # Software Engineering — code gen, SWE-bench

