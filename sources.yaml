      - preference optimization
      - constitutional AI
      - continual learning
  evaluation:
    label: "Evaluation & Safety"
    keywords:
      - benchmark
      - evaluation
      - leaderboard
      - hallucination
      - faithfulness
      - robustness
      - red team
      - safety
      - toxicity
      - contamination
      - MMLU
      - HumanEval
      - SWE-bench
  rag_and_retrieval:
    label: "RAG & Retrieval"
    keywords:
      - retrieval augmented generation
      - RAG
      - embedding
      - vector search
      - vector database
      - semantic search
      - chunking
      - reranking
      - dense retrieval
      - hybrid search
      - FAISS
      - ColBERT
  agents_and_tools:
    label: "Agents & Tools"
    keywords:
      - agent
      - tool use
      - function calling
      - planning
      - chain of thought
      - reasoning
      - code generation
      - agentic
      - multi-agent
      - orchestration
      - MCP
      - computer use
      - browser agent
  data_engineering:
    label: "Data Engineering"
    keywords:
      - dataset
      - synthetic data
      - data generation
      - annotation
      - data curation
      - data filtering
      - deduplication
      - data quality
      - data pipeline
      - tokenization
      - data mixing
      - feature engineering

